# Postgres for api-gateway integration tests (npm run test:integration).
# Matches DATABASE_URL in integration/setup.ts: postgresql://test:test@localhost:5432/depp_test
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: depp_test
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d depp_test']
      interval: 2s
      timeout: 5s
      retries: 15
